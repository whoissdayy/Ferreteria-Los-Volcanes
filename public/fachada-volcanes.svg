<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fachada de la tienda Ferretería Los Volcanes">
  <!-- Recreación estilizada de la fachada real (no es la fotografía original), con los
       elementos visibles en la foto: rótulo con marcas, panel del logo, toldo a rayas,
       vitrinas, anaqueles de fierro, bicicleta y señalización lateral. -->
  <rect width="900" height="560" fill="#d8eef8" />
  <rect x="0" y="470" width="900" height="90" fill="#9aa3a8" />

  <!-- fachada principal en rojo -->
  <rect x="55" y="150" width="800" height="330" fill="#c41e1e" />
  <rect x="55" y="150" width="800" height="330" fill="url(#brickShade)" opacity="0.15" />

  <!-- rótulo blanco superior con marcas y teléfonos -->
  <rect x="80" y="72" width="750" height="88" fill="#ffffff" stroke="#111111" stroke-width="3" />
  <text x="450" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#111111">FERRETERIA &quot;LOS VOLCANES&quot;</text>
  <text x="450" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#444444">CERRADURAS · CANDADOS · BISAGRAS · REJAS</text>
  <text x="105" y="92" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="800" fill="#0284c7">PHILLIPS</text>
  <text x="105" y="148" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#444444">Fax. 3183-3373</text>
  <text x="795" y="92" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="800" fill="#222222">ASSA ABLOY</text>
  <text x="795" y="148" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#444444">Tels. 3183-3374 y 1734-2721</text>

  <!-- panel azul del logo, debajo del rótulo principal -->
  <rect x="350" y="172" width="200" height="46" rx="4" fill="#1d4f8f" stroke="#f2b705" stroke-width="3" />
  <g>
    <polygon points="368,210 388,182 405,210" fill="#d62828" />
    <polygon points="398,210 415,188 432,210" fill="#f2b705" />
    <polygon points="422,210 435,194 448,210" fill="#16a34a" />
  </g>
  <text x="500" y="201" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="800" fill="#ffffff">LOS VOLCANES</text>

  <!-- toldo corrugado a rayas azul / amarillo -->
  <g>
    <rect x="55" y="230" width="800" height="34" fill="#0284c7" />
    <rect x="55" y="230" width="34" height="34" fill="#f2b705" />
    <rect x="123" y="230" width="34" height="34" fill="#f2b705" />
    <rect x="191" y="230" width="34" height="34" fill="#f2b705" />
    <rect x="259" y="230" width="34" height="34" fill="#f2b705" />
    <rect x="327" y="230" width="34" height="34" fill="#f2b705" />
    <rect x="395" y="230" width="34" height="34" fill="#f2b705" />
    <rect x="463" y="230" width="34" height="34" fill="#f2b705" />
    <rect x="531" y="230" width="34" height="34" fill="#f2b705" />
    <rect x="599" y="230" width="34" height="34" fill="#f2b705" />
    <rect x="667" y="230" width="34" height="34" fill="#f2b705" />
    <rect x="735" y="230" width="34" height="34" fill="#f2b705" />
    <rect x="803" y="230" width="34" height="34" fill="#f2b705" />
  </g>

  <!-- vitrinas y entrada con exhibición de producto -->
  <rect x="380" y="280" width="180" height="200" fill="#1b2733" opacity="0.85" />
  <rect x="220" y="280" width="140" height="200" fill="#3a4a57" opacity="0.7" />
  <rect x="580" y="280" width="140" height="200" fill="#3a4a57" opacity="0.7" />
  <!-- maniquí / figura recortada cerca de la entrada -->
  <g opacity="0.9">
    <circle cx="430" cy="320" r="10" fill="#e8c9a1" />
    <rect x="420" y="330" width="20" height="40" rx="4" fill="#1d4f8f" />
    <rect x="416" y="368" width="10" height="35" fill="#2a2a2a" />
    <rect x="434" y="368" width="10" height="35" fill="#2a2a2a" />
  </g>
  <!-- mesa con productos exhibidos -->
  <rect x="240" y="440" width="100" height="10" fill="#5a4632" />
  <rect x="250" y="420" width="14" height="20" fill="#777777" />
  <rect x="268" y="415" width="14" height="25" fill="#999999" />
  <rect x="286" y="425" width="14" height="15" fill="#777777" />

  <!-- letrero amarillo con figura estilizada, cerca del borde izquierdo -->
  <rect x="65" y="285" width="46" height="60" fill="#f2b705" stroke="#111111" stroke-width="2" />
  <circle cx="88" cy="305" r="8" fill="#ffffff" />
  <rect x="80" y="314" width="16" height="22" fill="#ffffff" />

  <!-- anaqueles de fierro / lámina, lado izquierdo -->
  <g stroke="#cccccc" stroke-width="3">
    <line x1="20" y1="290" x2="20" y2="470" />
    <line x1="28" y1="295" x2="28" y2="470" />
    <line x1="36" y1="300" x2="36" y2="470" />
    <line x1="44" y1="292" x2="44" y2="470" />
  </g>
  <rect x="10" y="470" width="45" height="10" fill="#5a5a5a" />

  <!-- bicicleta roja recargada en la fachada -->
  <g stroke="#c41e1e" stroke-width="3" fill="none">
    <circle cx="150" cy="465" r="18" />
    <circle cx="198" cy="465" r="18" />
    <line x1="150" y1="465" x2="172" y2="430" />
    <line x1="172" y1="430" x2="198" y2="465" />
    <line x1="172" y1="430" x2="160" y2="465" />
    <line x1="172" y1="430" x2="184" y2="465" />
  </g>

  <!-- señalización lateral derecha: cerraduras/candados + Dremel -->
  <rect x="745" y="300" width="90" height="120" fill="#ffffff" stroke="#111111" stroke-width="2" />
  <text x="790" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#111111">CERRADURAS</text>
  <text x="790" y="334" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#111111">CANDADOS</text>
  <text x="790" y="348" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#111111">BISAGRAS</text>
  <text x="790" y="362" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#111111">REJAS</text>
  <rect x="752" y="375" width="76" height="18" fill="#f2b705" />
  <text x="790" y="388" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="800" fill="#111111">DREMEL</text>

  <!-- marcas en la fachada -->
  <text x="100" y="465" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">TRUPER</text>
  <text x="650" y="465" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff">PHILIPS</text>

  <defs>
    <linearGradient id="brickShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0" />
      <stop offset="1" stop-color="#000000" stop-opacity="0.4" />
    </linearGradient>
  </defs>
</svg>
